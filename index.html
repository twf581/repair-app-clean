<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repairs Estimator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eff6ff;
      margin: 0;
      padding: 16px;
      color: #0f172a;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #60a5fa 100%);
      color: white;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .hero-kicker {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .hero h1 {
      margin: 0 0 6px 0;
    }

    .hero p {
      margin: 0;
      opacity: 0.92;
      line-height: 1.5;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      border: 1px solid #dbeafe;
    }

    .hidden {
      display: none;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    input, select, button, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      box-sizing: border-box;
      margin-top: 6px;
      margin-bottom: 10px;
      background: white;
    }

    button {
      cursor: pointer;
      border: none;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 8px;
    }

    .service-btn {
      text-align: left;
      background: white;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      margin-bottom: 10px;
      transition: 0.15s ease;
    }

    .service-btn.active {
      border: 2px solid #2563eb;
      background: #eff6ff;
    }

    .service-btn:hover {
      border-color: #60a5fa;
    }

    .note-box {
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      color: #475569;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
